<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generador de Excusas</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-md-6 text-center">
                
                <div class="card shadow">
                    <div class="card-body">
                        <h1 class="card-title mb-4">🚀 Generador de Excusas</h1>
                        <p class="text-muted">¿Necesitas una excusa rápida? Pulsa el botón.</p>
                        
                        <button id="excuse-btn" class="btn btn-primary btn-lg w-100 shadow-sm">
                            Generar Nueva Excusa
                        </button>
                    </div>
                </div>

                <div class="mt-4 text-start">
                    <h5 class="text-secondary px-2">Historial de excusas:</h5>
                    <ul id="excuse-list" class="list-group shadow-sm">
                        </ul>
                </div>

            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
